name: Deploy Gift ERP

on:
  push:
    branches:
      - gift

jobs:
  deploy:
    name: Deploy ERP Application
    runs-on: ubuntu-latest

    env:
      APP_NAME: customized_forcommon
      BRANCH: gift
      SITE_NAME: erp.gift.et

    steps:
      - name: Validate Secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "ERROR: SERVER_HOST secret is missing."
            exit 1
          fi

          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "ERROR: SERVER_USER secret is missing."
            exit 1
          fi

          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: SSH_PRIVATE_KEY secret is missing."
            exit 1
          fi

          echo "All required secrets are available."

      - name: Deploy to Gift Production Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            chmod +x /home/guba/deploy.sh

            /home/guba/deploy.sh \
              "customized_forcommon" \
              "gift" \
              "erp.gift.et"
            
