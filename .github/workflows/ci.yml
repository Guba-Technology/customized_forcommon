name: Deploy Gift ERP

on:
  push:
    branches:
      - gift
  pull_request:

jobs:
  deploy:
    name: Deploy ERP Applications
    runs-on: self-hosted

    env:
      APP_NAME: customized_forcommon
      BRANCH: gift
      SITE_NAME: erp.gift.et

    steps:
      # No secrets validation needed since we run locally as the host user
      
      # Step runs natively on the host filesystem
      - name: Deploy Locally to Gift Production
        shell: bash
        run: |
          chmod +x /home/guba/deploy.sh
          
          /home/guba/deploy.sh "${{ env.APP_NAME }}" "${{ env.BRANCH }}" "${{ env.SITE_NAME }}"
